name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: gateway
          POSTGRES_PASSWORD: gateway
          POSTGRES_DB: gateway
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gateway"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://gateway:gateway@localhost:5432/gateway

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm -r --if-present lint

      - name: Typecheck
        run: pnpm -r --if-present typecheck

      - name: Test
        run: pnpm -r --if-present test

      - name: Build
        run: pnpm -r --if-present build

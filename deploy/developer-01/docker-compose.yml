# Explicit project name keeps this stack isolated from the developer-01
# Odoo/n8n stack, which otherwise share the "developer-01" project namespace
# (derived from the compose file's parent directory) and the same network.
name: lynchpin-whatsapp-gateway-developer-01

services:
  db:
    image: postgres:16
    container_name: lynchpin-whatsapp-gateway-developer-01-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: gateway
      POSTGRES_DB: gateway
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gateway -d gateway"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway-api:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: lynchpin-whatsapp-gateway:developer-01
    container_name: lynchpin-whatsapp-gateway-developer-01
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "127.0.0.1:3010:3010"
    volumes:
      - ./data/sessions:/app/sessions
